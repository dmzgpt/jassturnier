                        <div><div className="text-center font-bold text-sm text-red-700 mb-1">Rot</div>{renderPM('rot1', ocrData.rot[0], matchResults.rot[0], ocrPreview.rot1Id, 'bg-red-600')}{renderPM('rot2', ocrData.rot[1], matchResults.rot[1], ocrPreview.rot2Id, 'bg-red-600')}</div>
                      </div>
                      <div><div className="text-sm font-bold text-gray-600 mb-1">Erkannte Punkte:</div><div className="grid grid-cols-8 gap-1 text-center text-sm font-semibold">{ocrData.punkte.map((s, i) => <div key={i} className={`py-1 rounded ${s !== null ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-400'}`}>{s ?? '?'}</div>)}</div></div>
                      <div className="flex gap-3"><button onClick={() => setOcrPreview(null)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold text-lg min-h-[48px]">✕ Verwerfen</button><button onClick={applyOCRData} className="flex-1 py-3 bg-green-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-green-700">✅ Übernehmen</button></div>
                    </div>
                  );
                })()}
              </div>
              <div className="flex gap-3">
                <button onClick={onClose} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold text-lg min-h-[48px] hover:bg-gray-300">Abbrechen</button>
                <button onClick={saveSheet} disabled={saving} className={`flex-1 py-3 rounded-lg font-bold text-lg min-h-[48px] text-white ${saving ? 'bg-gray-400' : isComplete ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700'}`}>{saving ? '...' : isComplete ? '✅ Speichern' : '💾 Zwischenspeichern'}</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════
    //  TAB 3: RANGLISTE
    // ════════════════════════════════════════════
    function RanglisteTab() {
      const { allPlayers } = usePlayers();
      const [loading, setLoading] = useState(true);
      const [tournaments, setTournaments] = useState([]);
      const [selectedTournament, setSelectedTournament] = useState(null);
      const [tableSheets, setTableSheets] = useState([]);
      const [tournamentPlayerIds, setTournamentPlayerIds] = useState([]);
      const [showPrintRangliste, setShowPrintRangliste] = useState(false);

      useEffect(() => {
        (async () => {
          const { data: tData } = await supabase.from('tournaments').select('*').order('date', { ascending: false }).limit(50);
          setTournaments(tData || []);
          if (tData && tData.length > 0) await loadTournamentData(tData[0]);
          setLoading(false);
        })();
      }, []);

      const loadTournamentData = async (t) => {
        setSelectedTournament(t);
        const [sRes, tpRes] = await Promise.all([
          supabase.from('table_sheets').select('*').eq('tournament_id', t.id),
          supabase.from('tournament_players').select('player_id').eq('tournament_id', t.id)
        ]);
        setTableSheets(sRes.data || []);
        setTournamentPlayerIds((tpRes.data || []).map(x => x.player_id));
      };

      const rankings = useMemo(() => {
        if (!selectedTournament || tableSheets.length === 0) return [];
        const playerMap = {};
        allPlayers.forEach(p => { playerMap[p.id] = p.name; });
        const scores = {};
        tournamentPlayerIds.forEach(pid => { scores[pid] = { name: playerMap[pid] || 'Unbekannt', rounds: {}, total: 0 }; });
        tableSheets.forEach(sheet => {
          if (!sheet.games) return;
          const totalSchwarz = sheet.games.reduce((s, g) => s + (g.schwarz ?? 0), 0);
          const totalRot = sheet.games.reduce((s, g) => s + (g.schwarz !== null && g.schwarz !== undefined ? 157 - g.schwarz : 0), 0);
          const round = sheet.round_number;
          [sheet.schwarz_player1_id, sheet.schwarz_player2_id].forEach(pid => { if (pid && scores[pid]) { scores[pid].rounds[round] = (scores[pid].rounds[round] || 0) + totalSchwarz; scores[pid].total += totalSchwarz; } });
          [sheet.rot_player1_id, sheet.rot_player2_id].forEach(pid => { if (pid && scores[pid]) { scores[pid].rounds[round] = (scores[pid].rounds[round] || 0) + totalRot; scores[pid].total += totalRot; } });
        });
        return Object.entries(scores).map(([id, data]) => ({ id, ...data })).sort((a, b) => b.total - a.total);
      }, [selectedTournament, tableSheets, allPlayers, tournamentPlayerIds]);

      if (loading) return <Spinner text="Rangliste wird berechnet..." />;

      return (
        <div className="space-y-5">
          <div className="bg-white rounded-xl shadow p-5">
            <label className="block text-lg font-semibold text-gray-700 mb-2">Turnier auswählen</label>
            <select value={selectedTournament?.id || ''} onChange={e => { const t = tournaments.find(x => x.id === e.target.value); if (t) loadTournamentData(t); }}
              className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none bg-white">
              {tournaments.map(t => <option key={t.id} value={t.id}>{formatDateCH(t.date)} — {t.player_count} Spieler</option>)}
            </select>
          </div>
          {selectedTournament && (
            <div className="bg-white rounded-xl shadow overflow-hidden">
              <div className="p-5 border-b flex items-center justify-between">
                <h2 className="text-xl font-bold text-gray-800">Rangliste</h2>
                {rankings.length > 0 && <button onClick={() => setShowPrintRangliste(true)} className="px-5 py-2 bg-gray-800 text-white rounded-lg font-bold text-base min-h-[44px] hover:bg-gray-900">🖨️ Drucken</button>}
              </div>
              {rankings.length === 0 ? (
                <p className="p-8 text-center text-gray-400 text-lg">Noch keine Resultate vorhanden.</p>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-lg">
                    <thead><tr className="bg-gray-100">
                      <th className="px-4 py-3 text-left font-bold text-gray-600">#</th>
                      <th className="px-4 py-3 text-left font-bold text-gray-600">Name</th>
                      {[1,2,3,4,5].map(r => <th key={r} className="px-3 py-3 text-center font-bold text-gray-600 hidden sm:table-cell">R{r}</th>)}
                      <th className="px-4 py-3 text-right font-bold text-gray-800">Total</th>
                    </tr></thead>
                    <tbody>
                      {rankings.map((row, idx) => {
                        const rank = idx + 1;
                        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
                        const bgClass = rank === 1 ? 'bg-yellow-50' : rank === 2 ? 'bg-gray-50' : rank === 3 ? 'bg-orange-50' : '';
                        return (
                          <tr key={row.id} className={`border-t ${bgClass}`}>
                            <td className="px-4 py-3 font-bold text-gray-500">{medal || rank}</td>
                            <td className="px-4 py-3 font-semibold text-gray-800">{row.name}</td>
                            {[1,2,3,4,5].map(r => <td key={r} className="px-3 py-3 text-center text-gray-500 hidden sm:table-cell">{row.rounds[r] || '—'}</td>)}
                            <td className="px-4 py-3 text-right font-bold text-gray-900 text-xl">{row.total > 0 ? row.total.toLocaleString('de-CH') : '—'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
          {showPrintRangliste && selectedTournament && <PrintRangliste tournament={selectedTournament} rankings={rankings} onClose={() => setShowPrintRangliste(false)} />}
        </div>
      );
    }

    // ════════════════════════════════════════════
    //  TAB 4: SAISON
    // ════════════════════════════════════════════
    function SaisonTab() {
      const toast = useToast();
      const { allPlayers } = usePlayers();
      const [loading, setLoading] = useState(true);
      const [seasons, setSeasons] = useState([]);
      const [tournaments, setTournaments] = useState([]);
      const [allSheets, setAllSheets] = useState([]);
      const [selectedSeason, setSelectedSeason] = useState(null);
      const [showCreateSeason, setShowCreateSeason] = useState(false);
      const [editSeason, setEditSeason] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [showPrint, setShowPrint] = useState(false);
      const [showAssign, setShowAssign] = useState(false);

      const loadData = useCallback(async () => {
        const [sRes, tRes] = await Promise.all([
          supabase.from('seasons').select('*').order('start_date', { ascending: false }),
          supabase.from('tournaments').select('*').order('date', { ascending: false })
        ]);
        setSeasons(sRes.data || []);
        setTournaments(tRes.data || []);
        const activeSeason = (sRes.data || []).find(s => s.active);
        if (activeSeason && !selectedSeason) setSelectedSeason(activeSeason);
        setLoading(false);
      }, []);

      useEffect(() => { loadData(); }, [loadData]);

      useEffect(() => {
        if (!selectedSeason) { setAllSheets([]); return; }
        const seasonTournaments = tournaments.filter(t => t.season_id === selectedSeason.id);
        if (seasonTournaments.length === 0) { setAllSheets([]); return; }
        (async () => {
          const ids = seasonTournaments.map(t => t.id);
          const { data } = await supabase.from('table_sheets').select('*').in('tournament_id', ids);
          setAllSheets(data || []);
        })();
      }, [selectedSeason?.id, tournaments]);

      const seasonTournaments = useMemo(() => {
        if (!selectedSeason) return [];
        return tournaments.filter(t => t.season_id === selectedSeason.id).sort((a, b) => a.date.localeCompare(b.date));
      }, [selectedSeason, tournaments]);

      const seasonRankings = useMemo(() => {
        if (!selectedSeason || seasonTournaments.length === 0 || allSheets.length === 0) return [];
        const playerMap = {};
        allPlayers.forEach(p => { playerMap[p.id] = p.name; });
        const playerTournamentScores = {};
        seasonTournaments.forEach(tournament => {
          const sheets = allSheets.filter(s => s.tournament_id === tournament.id);
          const scores = {};
          sheets.forEach(sheet => {
            if (!sheet.games) return;
            const totalS = sheet.games.reduce((s, g) => s + (g.schwarz ?? 0), 0);
            const totalR = sheet.games.reduce((s, g) => s + (g.schwarz !== null && g.schwarz !== undefined ? 157 - g.schwarz : 0), 0);
            [sheet.schwarz_player1_id, sheet.schwarz_player2_id].forEach(pid => { if (pid) scores[pid] = (scores[pid] || 0) + totalS; });
            [sheet.rot_player1_id, sheet.rot_player2_id].forEach(pid => { if (pid) scores[pid] = (scores[pid] || 0) + totalR; });
          });
          Object.entries(scores).forEach(([pid, total]) => {
            if (!playerTournamentScores[pid]) playerTournamentScores[pid] = [];
            playerTournamentScores[pid].push({ tournamentId: tournament.id, date: tournament.date, total });
          });
        });
        const mode = selectedSeason.ranking_mode || 'best_of';
        const bestOf = selectedSeason.best_of || 3;
        return Object.entries(playerTournamentScores).map(([pid, results]) => {
          const sorted = [...results].sort((a, b) => b.total - a.total);
          let countedResults, grandTotal;
          if (mode === 'best_of') { countedResults = sorted.slice(0, bestOf); grandTotal = countedResults.reduce((s, r) => s + r.total, 0); }
          else { countedResults = sorted; grandTotal = sorted.reduce((s, r) => s + r.total, 0); }
          return { id: pid, name: playerMap[pid] || 'Unbekannt', results: results.sort((a, b) => a.date.localeCompare(b.date)), countedResults, total: grandTotal, tournamentCount: results.length };
        }).sort((a, b) => b.total - a.total);
      }, [selectedSeason, seasonTournaments, allSheets, allPlayers]);

      const createSeason = async (data) => {
        if (data.active) await supabase.from('seasons').update({ active: false }).neq('id', 'none');
        const { error } = await supabase.from('seasons').insert(data);
        if (error) { toast('Fehler: ' + error.message, 'error'); return; }
        toast('Saison erstellt'); setShowCreateSeason(false); loadData();
      };
      const updateSeason = async (id, data) => {
        if (data.active) await supabase.from('seasons').update({ active: false }).neq('id', id);
        const { error } = await supabase.from('seasons').update(data).eq('id', id);
        if (error) { toast('Fehler: ' + error.message, 'error'); return; }
        toast('Saison aktualisiert'); setEditSeason(null); loadData();
      };
      const deleteSeason = async (season) => {
        await supabase.from('tournaments').update({ season_id: null }).eq('season_id', season.id);
        const { error } = await supabase.from('seasons').delete().eq('id', season.id);
        if (error) { toast('Fehler: ' + error.message, 'error'); return; }
        setDeleteConfirm(null);
        if (selectedSeason?.id === season.id) setSelectedSeason(null);
        toast('Saison gelöscht'); loadData();
      };
      const assignTournament = async (tournamentId, seasonId) => {
        const { error } = await supabase.from('tournaments').update({ season_id: seasonId }).eq('id', tournamentId);
        if (error) { toast('Fehler', 'error'); return; }
        toast('Turnier zugewiesen'); loadData();
      };
      const unassignTournament = async (tournamentId) => {
        const { error } = await supabase.from('tournaments').update({ season_id: null }).eq('id', tournamentId);
        if (error) { toast('Fehler', 'error'); return; }
        toast('Turnier entfernt'); loadData();
      };

      if (loading) return <Spinner text="Saisons werden geladen..." />;

      return (
        <div className="space-y-5">
          <div className="bg-white rounded-xl shadow p-5">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
              <h2 className="text-xl font-bold text-gray-800">Saison</h2>
              <button onClick={() => setShowCreateSeason(true)} className="px-5 py-3 bg-blue-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-blue-700">+ Neue Saison</button>
            </div>
            {seasons.length === 0 ? (
              <p className="text-gray-400 text-lg text-center py-4">Noch keine Saison erstellt.</p>
            ) : (
              <div className="space-y-2">
                {seasons.map(s => {
                  const isSelected = selectedSeason?.id === s.id;
                  const tCount = tournaments.filter(t => t.season_id === s.id).length;
                  return (
                    <div key={s.id} className={`flex items-center gap-3 px-4 py-3 rounded-lg border-2 cursor-pointer transition-all ${isSelected ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-400'}`}
                      onClick={() => setSelectedSeason(s)}>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="text-lg font-bold text-gray-800 truncate">{s.name}</span>
                          {s.active && <span className="px-2 py-0.5 bg-green-100 text-green-700 text-sm font-bold rounded">Aktiv</span>}
                        </div>
                        <span className="text-sm text-gray-500">
                          {s.start_date && s.end_date ? `${formatDateCH(s.start_date)} – ${formatDateCH(s.end_date)}` : 'Kein Zeitraum'}
                          {' · '}{tCount} Turniere
                          {' · '}{s.ranking_mode === 'best_of' ? `Best of ${s.best_of}` : 'Alle zählen'}
                        </span>
                      </div>
                      <div className="flex gap-2 flex-shrink-0" onClick={e => e.stopPropagation()}>
                        <button onClick={() => setEditSeason(s)} className="px-3 py-2 bg-gray-200 text-gray-700 rounded-lg min-h-[44px] hover:bg-gray-300">✏️</button>
                        <button onClick={() => setDeleteConfirm(s)} className="px-3 py-2 bg-red-100 text-red-600 rounded-lg min-h-[44px] hover:bg-red-200">🗑️</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {selectedSeason && (
            <>
              <div className="bg-white rounded-xl shadow p-5">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-bold text-gray-700">Turniere in «{selectedSeason.name}»</h3>
                  <button onClick={() => setShowAssign(true)} className="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg font-semibold text-base min-h-[44px] hover:bg-blue-200">+ Turnier zuweisen</button>
                </div>
                {seasonTournaments.length === 0 ? (
                  <p className="text-gray-400 text-lg text-center py-4">Keine Turniere zugewiesen.</p>
                ) : (
                  <div className="space-y-2">
                    {seasonTournaments.map(t => (
                      <div key={t.id} className="flex items-center justify-between px-4 py-3 rounded-lg border border-gray-200">
                        <div><span className="text-lg font-semibold text-gray-800">{formatDateCH(t.date)}</span><span className="text-gray-500 ml-2">{t.player_count} Spieler</span></div>
                        <button onClick={() => unassignTournament(t.id)} className="px-3 py-2 bg-red-100 text-red-600 rounded-lg text-sm font-semibold min-h-[40px] hover:bg-red-200">Entfernen</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow overflow-hidden">
                <div className="p-5 border-b flex items-center justify-between">
                  <h3 className="text-xl font-bold text-gray-800">🏆 Saisonrangliste</h3>
                  {seasonRankings.length > 0 && <button onClick={() => setShowPrint(true)} className="px-5 py-2 bg-gray-800 text-white rounded-lg font-bold text-base min-h-[44px] hover:bg-gray-900">🖨️ Drucken</button>}
                </div>
                <div className="px-5 py-2 bg-gray-50 border-b text-sm text-gray-500">
                  Modus: {selectedSeason.ranking_mode === 'best_of' ? `Best of ${selectedSeason.best_of}` : 'Summe aller Turniere'}
                  {' · '}{seasonTournaments.length} Turniere
                </div>
                {seasonRankings.length === 0 ? (
                  <p className="p-8 text-center text-gray-400 text-lg">Noch keine Resultate.</p>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-lg">
                      <thead><tr className="bg-gray-100">
                        <th className="px-4 py-3 text-left font-bold text-gray-600">#</th>
                        <th className="px-4 py-3 text-left font-bold text-gray-600">Name</th>
                        {seasonTournaments.map((t, i) => <th key={t.id} className="px-3 py-3 text-center font-bold text-gray-600 hidden sm:table-cell" title={formatDateCH(t.date)}>T{i + 1}</th>)}
                        <th className="px-3 py-3 text-center font-bold text-gray-600 hidden sm:table-cell">Anz.</th>
                        <th className="px-4 py-3 text-right font-bold text-gray-800">Total</th>
                      </tr></thead>
                      <tbody>
                        {seasonRankings.map((row, idx) => {
                          const rank = idx + 1; const medal = rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : '';
                          const bgClass = rank <= 3 ? ['bg-yellow-50','bg-gray-50','bg-orange-50'][rank-1] : '';
                          const countedIds = new Set(row.countedResults.map(r => r.tournamentId));
                          return (
                            <tr key={row.id} className={`border-t ${bgClass}`}>
                              <td className="px-4 py-3 font-bold text-gray-500">{medal || rank}</td>
                              <td className="px-4 py-3 font-semibold text-gray-800">{row.name}</td>
                              {seasonTournaments.map(t => { const r = row.results.find(x => x.tournamentId === t.id); const isCounted = r && countedIds.has(t.id); return <td key={t.id} className={`px-3 py-3 text-center hidden sm:table-cell ${isCounted ? 'text-gray-800 font-semibold' : 'text-gray-300'}`}>{r ? r.total.toLocaleString('de-CH') : '—'}</td>; })}
                              <td className="px-3 py-3 text-center text-gray-400 hidden sm:table-cell">{row.tournamentCount}</td>
                              <td className="px-4 py-3 text-right font-bold text-gray-900 text-xl">{row.total > 0 ? row.total.toLocaleString('de-CH') : '—'}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </>
