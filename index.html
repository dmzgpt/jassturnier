<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jass-Turnier-Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap');
    * { box-sizing: border-box; }
    body { font-family: 'Source Sans 3', sans-serif; margin: 0; background: #F3F4F6; min-height: 100vh; }
    input, select, button, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #E5E7EB; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #9CA3AF; border-radius: 4px; }
    .tab-active { border-bottom: 3px solid #2563EB; color: #2563EB; font-weight: 700; }
    .tab-inactive { border-bottom: 3px solid transparent; color: #6B7280; }
    .tab-inactive:hover { color: #374151; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .modal-backdrop { background: rgba(0,0,0,0.5); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-slide { animation: slideIn 0.3s ease-out; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.3); } 50% { box-shadow: 0 0 0 8px rgba(37,99,235,0); } }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    @media print {
      body { background: white !important; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print, .toast-slide { display: none !important; }
      .print-only { display: block !important; }
      .print-page-break { page-break-after: always; break-after: page; }
      .print-avoid-break { page-break-inside: avoid; break-inside: avoid; }
      .print-overlay { position: static !important; background: white !important; overflow: visible !important; }
      body.printing-active #root { display: none !important; }
    }
    @media screen { .print-only { display: none !important; } }
    .print-overlay-screen { position: fixed; inset: 0; z-index: 10000; background: white; overflow-y: auto; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            schwarz: '#1F2937',
            rot: '#DC2626',
            erfolg: '#16A34A',
            fehler: '#DC2626',
            warnung: '#D97706',
            primaer: '#2563EB',
          },
          fontSize: {
            'body': '16px',
            'input': '20px',
            'heading': '24px',
            'xl-heading': '28px',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <div id="print-portal"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext } = React;

    // ─── Error Boundary ───
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error('ErrorBoundary caught:', error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return React.createElement('div', {
            style: { padding: 32, textAlign: 'center', minHeight: '60vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }
          },
            React.createElement('div', { style: { fontSize: 48 } }, '⚠️'),
            React.createElement('h2', { style: { fontSize: 22, fontWeight: 700, color: '#1F2937' } }, 'Etwas ist schiefgelaufen'),
            React.createElement('p', { style: { fontSize: 16, color: '#6B7280', maxWidth: 400 } },
              'Ein unerwarteter Fehler ist aufgetreten. Bitte die Seite neu laden.'),
            React.createElement('pre', { style: { fontSize: 13, color: '#DC2626', background: '#FEF2F2', padding: 12, borderRadius: 8, maxWidth: 500, overflow: 'auto', textAlign: 'left' } },
              String(this.state.error)),
            React.createElement('button', {
              onClick: () => window.location.reload(),
              style: { padding: '12px 32px', background: '#2563EB', color: 'white', borderRadius: 8, fontWeight: 700, fontSize: 18, border: 'none', cursor: 'pointer', minHeight: 48 }
            }, '🔄 Seite neu laden')
          );
        }
        return this.props.children;
      }
    }

    // ─── Supabase Client ───
    const SUPABASE_URL = 'https://tzdiqzfiafzbgrkzqioj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6ZGlxemZpYWZ6Ymdya3pxaW9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjYwNzgsImV4cCI6MjA5MTc0MjA3OH0.9qNjD12E5GaD1dd_REx0DiaeH5uFac8prboLSuu_2mQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── Toast Context ───
    const ToastContext = createContext();
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = useCallback((msg, type = 'success') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      }, []);
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-2" style={{maxWidth:'400px'}}>
            {toasts.map(t => (
              <div key={t.id} className={`toast-slide px-5 py-3 rounded-lg shadow-lg text-white text-lg font-semibold ${t.type === 'error' ? 'bg-red-600' : t.type === 'warning' ? 'bg-amber-500' : 'bg-green-600'}`}>
                {t.msg}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }
    function useToast() { return useContext(ToastContext); }

    // ─── Shared Players Context ───
    const PlayersContext = createContext({ allPlayers: [], refreshPlayers: () => {} });
    function PlayersProvider({ children }) {
      const [allPlayers, setAllPlayers] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const refreshPlayers = useCallback(async () => {
        const { data } = await supabase.from('players').select('*').order('name');
        setAllPlayers(data || []);
        setLoaded(true);
        return data || [];
      }, []);
      useEffect(() => { refreshPlayers(); }, [refreshPlayers]);
      return (
        <PlayersContext.Provider value={{ allPlayers, activePlayers: allPlayers.filter(p => p.active), refreshPlayers, loaded }}>
          {children}
        </PlayersContext.Provider>
      );
    }
    function usePlayers() { return useContext(PlayersContext); }

    // ─── Confirm Dialog ───
    function ConfirmDialog({ open, title, message, onConfirm, onCancel, confirmLabel = 'Ja', cancelLabel = 'Abbrechen', danger = false }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-[9000] flex items-center justify-center modal-backdrop" onClick={onCancel}>
          <div className="bg-white rounded-xl shadow-2xl p-6 m-4 max-w-md w-full fade-in" onClick={e => e.stopPropagation()}>
            <h3 className="text-xl font-bold text-gray-800 mb-2">{title}</h3>
            <p className="text-lg text-gray-600 mb-6">{message}</p>
            <div className="flex gap-3 justify-end">
              <button onClick={onCancel} className="px-5 py-3 rounded-lg bg-gray-200 text-gray-700 font-semibold text-lg hover:bg-gray-300 min-h-[48px]">{cancelLabel}</button>
              <button onClick={onConfirm} className={`px-5 py-3 rounded-lg text-white font-semibold text-lg min-h-[48px] ${danger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>{confirmLabel}</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Searchable Player Dropdown ───
    function PlayerDropdown({ players, value, onChange, label, bgClass = 'bg-white', textClass = 'text-gray-900', excludeIds = [] }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');
      const ref = useRef(null);
      const selected = players.find(p => p.id === value);
      const filtered = players.filter(p =>
        !excludeIds.includes(p.id) && p.name.toLowerCase().includes(search.toLowerCase())
      );
      useEffect(() => {
        function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, []);
      return (
        <div ref={ref} className="relative">
          <label className="block text-sm font-semibold mb-1 text-gray-500">{label}</label>
          <button type="button" onClick={() => { setOpen(!open); setSearch(''); }}
            className={`w-full text-left px-4 py-3 rounded-lg border-2 border-gray-300 text-lg font-semibold min-h-[48px] ${bgClass} ${textClass} ${!selected ? 'italic text-gray-400' : ''}`}>
            {selected ? selected.name : 'Spieler wählen...'}
          </button>
          {open && (
            <div className="absolute z-50 mt-1 w-full bg-white border-2 border-gray-300 rounded-lg shadow-xl max-h-60 overflow-auto fade-in">
              <div className="sticky top-0 bg-white p-2 border-b">
                <input autoFocus type="text" placeholder="Suchen..." value={search} onChange={e => setSearch(e.target.value)}
                  className="w-full px-3 py-2 border rounded-lg text-lg" />
              </div>
              {value && (
                <button onClick={() => { onChange(null); setOpen(false); }}
                  className="w-full text-left px-4 py-3 hover:bg-gray-100 text-gray-400 italic text-lg border-b">— Auswahl entfernen —</button>
              )}
              {filtered.length === 0 && <div className="px-4 py-3 text-gray-400 text-lg">Kein Spieler gefunden</div>}
              {filtered.map(p => (
                <button key={p.id} onClick={() => { onChange(p.id); setOpen(false); }}
                  className={`w-full text-left px-4 py-3 hover:bg-blue-50 text-lg ${p.id === value ? 'bg-blue-100 font-bold' : ''}`}>
                  {p.name}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Loading Spinner ───
    function Spinner({ text = 'Laden...' }) {
      return (
        <div className="flex items-center justify-center py-12 gap-3">
          <svg className="animate-spin h-7 w-7 text-blue-600" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
          <span className="text-lg text-gray-500">{text}</span>
        </div>
      );
    }

    // ─── Offline Warning ───
    function OfflineWarning() {
      const [isOffline, setIsOffline] = useState(!navigator.onLine);
      useEffect(() => {
        const goOffline = () => setIsOffline(true);
        const goOnline = () => setIsOffline(false);
        window.addEventListener('offline', goOffline);
        window.addEventListener('online', goOnline);
        return () => { window.removeEventListener('offline', goOffline); window.removeEventListener('online', goOnline); };
      }, []);
      if (!isOffline) return null;
      return (
        <div className="fixed bottom-0 left-0 right-0 z-[9999] bg-red-600 text-white text-center py-3 px-4 text-lg font-bold shadow-lg no-print">
          ⚠️ Keine Internetverbindung — Daten können nicht gespeichert oder geladen werden
        </div>
      );
    }

    // ─── Date formatting helper ───
    function formatDateCH(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('de-CH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }
    function formatDateLong(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('de-CH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    // ════════════════════════════════════════════
    //  TAB 1: VERWALTUNG
    // ════════════════════════════════════════════
    function VerwaltungTab() {
      const toast = useToast();
      const { allPlayers: players, refreshPlayers, loaded } = usePlayers();
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [showInactive, setShowInactive] = useState(false);
      const [editPlayer, setEditPlayer] = useState(null);
      const [newName, setNewName] = useState('');
      const [newPhone, setNewPhone] = useState('');
      const [editName, setEditName] = useState('');
      const [editPhone, setEditPhone] = useState('');
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [apiKey, setApiKey] = useState('');
      const [apiKeySaved, setApiKeySaved] = useState(false);
      const [showApiSection, setShowApiSection] = useState(false);

      const loadPlayers = useCallback(async () => {
        await refreshPlayers();
        setLoading(false);
      }, [refreshPlayers]);

      const loadApiKey = useCallback(async () => {
        const { data } = await supabase.from('settings').select('value').eq('key', 'claude_api_key').single();
        if (data?.value) { setApiKey(data.value); setApiKeySaved(true); }
      }, []);

      useEffect(() => { loadPlayers(); loadApiKey(); }, [loadPlayers, loadApiKey]);

      const addPlayer = async () => {
        const name = newName.trim();
        if (!name) { toast('Bitte Name eingeben', 'warning'); return; }
        const { error } = await supabase.from('players').insert({ name, phone: newPhone.trim() || null, active: true });
        if (error) { toast('Fehler: ' + (error.message.includes('unique') ? 'Name existiert bereits' : error.message), 'error'); return; }
        setNewName(''); setNewPhone('');
        toast(`${name} hinzugefügt`);
        loadPlayers();
      };

      const saveEdit = async () => {
        const name = editName.trim();
        if (!name) { toast('Name darf nicht leer sein', 'warning'); return; }
        const { error } = await supabase.from('players').update({ name, phone: editPhone.trim() || null }).eq('id', editPlayer.id);
        if (error) { toast('Fehler beim Speichern', 'error'); return; }
        setEditPlayer(null);
        toast('Gespeichert');
        loadPlayers();
      };

      const toggleActive = async (player) => {
        const { error } = await supabase.from('players').update({ active: !player.active }).eq('id', player.id);
        if (error) { toast('Fehler', 'error'); return; }
        toast(player.active ? `${player.name} deaktiviert` : `${player.name} aktiviert`);
        loadPlayers();
      };

      const deletePlayer = async (player) => {
        const { error } = await supabase.from('players').delete().eq('id', player.id);
        if (error) { toast('Kann nicht löschen – Spieler ist in Turnieren verwendet', 'error'); return; }
        setDeleteConfirm(null);
        toast(`${player.name} gelöscht`);
        loadPlayers();
      };

      const saveApiKey = async () => {
        const { error } = await supabase.from('settings').upsert({ key: 'claude_api_key', value: apiKey });
        if (error) { toast('Fehler beim Speichern', 'error'); return; }
        setApiKeySaved(true);
        toast('API-Key gespeichert');
      };

      const filtered = players.filter(p => {
        if (!showInactive && !p.active) return false;
        if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });
      const activeCount = players.filter(p => p.active).length;

      if (loading) return <Spinner text="Spieler werden geladen..." />;

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-xl shadow p-5">
            <h2 className="text-xl font-bold text-gray-800 mb-4">Neuer Spieler</h2>
            <div className="flex flex-col sm:flex-row gap-3">
              <input type="text" placeholder="Name *" value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addPlayer()}
                className="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none" />
              <input type="tel" placeholder="Telefon (optional)" value={newPhone} onChange={e => setNewPhone(e.target.value)} onKeyDown={e => e.key === 'Enter' && addPlayer()}
                className="sm:w-48 px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none" />
              <button onClick={addPlayer} className="px-6 py-3 bg-blue-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-blue-700 whitespace-nowrap">+ Hinzufügen</button>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow p-5">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
              <h2 className="text-xl font-bold text-gray-800">Spieler <span className="text-gray-400 font-normal">({activeCount} aktiv / {players.length} total)</span></h2>
              <label className="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" checked={showInactive} onChange={e => setShowInactive(e.target.checked)} className="w-5 h-5 rounded" />
                <span className="text-lg text-gray-600">Inaktive zeigen</span>
              </label>
            </div>
            <input type="text" placeholder="🔍 Spieler suchen..." value={search} onChange={e => setSearch(e.target.value)}
              className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg mb-4 min-h-[48px] focus:border-blue-500 focus:outline-none" />
            <div className="space-y-2 max-h-[60vh] overflow-y-auto">
              {filtered.length === 0 && <p className="text-gray-400 text-lg py-4 text-center">Keine Spieler gefunden</p>}
              {filtered.map(p => (
                <div key={p.id} className={`flex items-center gap-3 px-4 py-3 rounded-lg border ${p.active ? 'bg-white border-gray-200' : 'bg-gray-100 border-gray-200 opacity-60'}`}>
                  <div className="flex-1 min-w-0">
                    <span className="text-lg font-semibold text-gray-800 block truncate">{p.name}</span>
                    {p.phone && <span className="text-sm text-gray-400">{p.phone}</span>}
                  </div>
                  <div className="flex gap-2 flex-shrink-0">
                    <button onClick={() => { setEditPlayer(p); setEditName(p.name); setEditPhone(p.phone || ''); }}
                      className="px-3 py-2 bg-gray-200 text-gray-700 rounded-lg font-semibold min-h-[44px] hover:bg-gray-300 text-base">✏️</button>
                    <button onClick={() => toggleActive(p)}
                      className={`px-3 py-2 rounded-lg font-semibold min-h-[44px] text-base ${p.active ? 'bg-amber-100 text-amber-700 hover:bg-amber-200' : 'bg-green-100 text-green-700 hover:bg-green-200'}`}>
                      {p.active ? '⏸' : '▶️'}
                    </button>
                    <button onClick={() => setDeleteConfirm(p)}
                      className="px-3 py-2 bg-red-100 text-red-600 rounded-lg font-semibold min-h-[44px] hover:bg-red-200 text-base">🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-xl shadow p-5">
            <button onClick={() => setShowApiSection(!showApiSection)} className="flex items-center gap-2 text-lg font-bold text-gray-800">
              <span className="text-xl">{showApiSection ? '▾' : '▸'}</span> Einstellungen
            </button>
            {showApiSection && (
              <div className="mt-4 space-y-3">
                <label className="block text-lg text-gray-600">Claude API-Key</label>
                <div className="flex gap-3">
                  <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); setApiKeySaved(false); }} placeholder="sk-ant-..."
                    className="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none font-mono" />
                  <button onClick={saveApiKey} className={`px-6 py-3 rounded-lg font-bold text-lg min-h-[48px] text-white ${apiKeySaved ? 'bg-green-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    {apiKeySaved ? '✓ Gespeichert' : 'Speichern'}
                  </button>
                </div>
                <p className="text-sm text-gray-400">Wird für die OCR-Funktion benötigt.</p>
              </div>
            )}
          </div>

          {editPlayer && (
            <div className="fixed inset-0 z-[9000] flex items-center justify-center modal-backdrop" onClick={() => setEditPlayer(null)}>
              <div className="bg-white rounded-xl shadow-2xl p-6 m-4 max-w-md w-full fade-in" onClick={e => e.stopPropagation()}>
                <h3 className="text-xl font-bold text-gray-800 mb-4">Spieler bearbeiten</h3>
                <div className="space-y-3">
                  <input type="text" value={editName} onChange={e => setEditName(e.target.value)}
                    className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none" placeholder="Name" />
                  <input type="tel" value={editPhone} onChange={e => setEditPhone(e.target.value)}
                    className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none" placeholder="Telefon" />
                </div>
                <div className="flex gap-3 justify-end mt-6">
                  <button onClick={() => setEditPlayer(null)} className="px-5 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold text-lg min-h-[48px]">Abbrechen</button>
                  <button onClick={saveEdit} className="px-5 py-3 bg-blue-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-blue-700">Speichern</button>
                </div>
              </div>
            </div>
          )}
          <ConfirmDialog open={!!deleteConfirm} title="Spieler löschen?"
            message={`Soll "${deleteConfirm?.name}" wirklich gelöscht werden? Dies kann nicht rückgängig gemacht werden.`}
            onConfirm={() => deletePlayer(deleteConfirm)} onCancel={() => setDeleteConfirm(null)} confirmLabel="Löschen" danger />
        </div>
      );
    }

    // ════════════════════════════════════════════
    //  TURNIER-FLOW WIZARD (Phase 6b)
    // ════════════════════════════════════════════
    function TurnierFlowWizard({ tournament, tableSheets, activeRound, onSetRound, onStartScan, onShowRangliste, onPrintRangliste }) {
      // Compute per-round status
      const roundStats = useMemo(() => {
        return [1,2,3,4,5].map(r => {
          const sheets = tableSheets.filter(s => s.round_number === r);
          const verified = sheets.filter(s => s.verified);
          const withData = sheets.filter(s => s.games && s.games.some(g => g.schwarz !== null && g.schwarz !== undefined));
          const errors = sheets.filter(s => {
            if (!s.games) return false;
            const filled = s.games.filter(g => g.schwarz !== null && g.schwarz !== undefined);
            if (filled.length !== 8) return false;
            const total = filled.reduce((sum, g) => sum + g.schwarz + (157 - g.schwarz), 0);
            return total !== 1256;
          });
          return {
            round: r,
            total: tournament.table_count,
            captured: withData.length,
            verified: verified.length,
            errors: errors.length,
            complete: verified.length === tournament.table_count,
            missingTables: Array.from({length: tournament.table_count}, (_, i) => i + 1)
              .filter(t => !sheets.find(s => s.table_number === t && s.verified))
          };
        });
      }, [tableSheets, tournament.table_count]);

      const allComplete = roundStats.every(r => r.complete);
      const totalVerified = roundStats.reduce((s, r) => s + r.verified, 0);
      const totalTables = tournament.table_count * 5;
      const progressPercent = totalTables > 0 ? Math.round((totalVerified / totalTables) * 100) : 0;

      // Determine suggested next action
      const suggestedRound = useMemo(() => {
        for (let i = 0; i < 5; i++) {
          if (!roundStats[i].complete) return i + 1;
        }
        return null;
      }, [roundStats]);

      const currentRoundStats = activeRound ? roundStats[activeRound - 1] : null;

      return (
        <div className="bg-white rounded-xl shadow p-5 space-y-4">
          {/* Overall progress */}
          <div className="flex items-center justify-between">
            <h3 className="text-lg font-bold text-gray-700">Turnier-Fortschritt</h3>
            <span className="text-lg font-bold text-blue-600">{progressPercent}%</span>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
            <div className={`h-full rounded-full transition-all duration-500 ${allComplete ? 'bg-green-500' : 'bg-blue-500'}`}
              style={{ width: `${progressPercent}%` }} />
          </div>

          {/* Round steps */}
          <div className="flex gap-1 sm:gap-2">
            {roundStats.map(rs => {
              const isActive = activeRound === rs.round;
              const isSuggested = suggestedRound === rs.round && !isActive;
              let bgColor = 'bg-gray-100 border-gray-200';
              let textColor = 'text-gray-400';
              let icon = '⬜';
              if (rs.complete) { bgColor = 'bg-green-50 border-green-300'; textColor = 'text-green-700'; icon = '✅'; }
              else if (rs.errors > 0) { bgColor = 'bg-red-50 border-red-300'; textColor = 'text-red-600'; icon = '🔴'; }
              else if (rs.captured > 0) { bgColor = 'bg-amber-50 border-amber-300'; textColor = 'text-amber-700'; icon = '🟡'; }
              if (isActive) { bgColor = 'bg-blue-50 border-blue-500 ring-2 ring-blue-300'; }
              return (
                <button key={rs.round} onClick={() => onSetRound(rs.round)}
                  className={`flex-1 flex flex-col items-center py-2 px-1 rounded-lg border-2 transition-all min-h-[64px] ${bgColor} ${isSuggested ? 'pulse-glow' : ''}`}>
                  <span className="text-lg">{icon}</span>
                  <span className={`text-sm font-bold ${textColor}`}>R{rs.round}</span>
                  <span className={`text-xs ${textColor}`}>{rs.verified}/{rs.total}</span>
                </button>
              );
            })}
          </div>

          {/* Current round detail / suggestion */}
          {!allComplete && activeRound && currentRoundStats && !currentRoundStats.complete && (
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
              <div className="flex items-center justify-between mb-2">
                <span className="text-lg font-bold text-blue-800">Runde {activeRound}</span>
                <span className="text-base text-blue-600 font-semibold">{currentRoundStats.verified} von {currentRoundStats.total} Tische ✅</span>
              </div>
              {currentRoundStats.missingTables.length > 0 && (
                <div className="text-base text-blue-700 mb-3">
                  Fehlend: {currentRoundStats.missingTables.map(t => `Tisch ${t}`).join(', ')}
                </div>
              )}
              {currentRoundStats.errors > 0 && (
                <div className="text-base text-red-700 font-semibold mb-3">
                  ⚠️ {currentRoundStats.errors} Tisch{currentRoundStats.errors > 1 ? 'e' : ''} mit Fehlern (Total ≠ 1'256)
                </div>
              )}
              <button onClick={onStartScan}
                className="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-lg font-bold text-lg min-h-[48px] hover:from-amber-600 hover:to-orange-600 transition-all">
                📸 Nächsten Tischzettel scannen
              </button>
            </div>
          )}

          {/* Round complete → suggest next */}
          {!allComplete && activeRound && currentRoundStats && currentRoundStats.complete && suggestedRound && (
            <div className="bg-green-50 border border-green-300 rounded-lg p-4 text-center">
              <div className="text-xl font-bold text-green-700 mb-2">✅ Runde {activeRound} komplett!</div>
              <button onClick={() => onSetRound(suggestedRound)}
                className="px-8 py-3 bg-green-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-green-700 transition-all">
                ➡️ Weiter zu Runde {suggestedRound}
              </button>
            </div>
          )}

          {/* Suggest starting round if none active */}
          {!allComplete && !activeRound && suggestedRound && (
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center">
              <div className="text-lg font-semibold text-blue-700 mb-2">👉 Starte mit Runde {suggestedRound}</div>
              <button onClick={() => onSetRound(suggestedRound)}
                className="px-8 py-3 bg-blue-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-blue-700 transition-all">
                Runde {suggestedRound} öffnen
              </button>
            </div>
          )}

          {/* All complete! */}
          {allComplete && (
            <div className="bg-gradient-to-r from-green-50 to-emerald-50 border-2 border-green-300 rounded-xl p-5 text-center space-y-3">
              <div className="text-3xl">🎉</div>
              <div className="text-xl font-bold text-green-800">Turnier komplett!</div>
              <div className="text-lg text-green-700">
                {tournament.player_count} Spieler · 5 Runden · {totalVerified} Tischblätter erfasst
              </div>
              <div className="flex gap-3 justify-center flex-wrap">
                <button onClick={onShowRangliste}
                  className="px-6 py-3 bg-blue-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-blue-700">
                  📊 Rangliste anzeigen
                </button>
                <button onClick={onPrintRangliste}
                  className="px-6 py-3 bg-gray-800 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-gray-900">
                  🖨️ Rangliste drucken
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════
    //  TAB 2: TURNIER-ABEND
    // ════════════════════════════════════════════
    function TurnierTab({ qrParams, onQrHandled, onSwitchTab }) {
      const toast = useToast();
      const { allPlayers: players, activePlayers, refreshPlayers } = usePlayers();
      const [seasons, setSeasons] = useState([]);
      const [tournaments, setTournaments] = useState([]);
      const [loading, setLoading] = useState(true);

      const [date, setDate] = useState(() => new Date().toISOString().split('T')[0]);
      const [selectedSeasonId, setSelectedSeasonId] = useState(null);
      const [selectedPlayers, setSelectedPlayers] = useState(new Set());
      const [playerSearch, setPlayerSearch] = useState('');
      const [activeTournament, setActiveTournament] = useState(null);
      const [activeRound, setActiveRound] = useState(null);
      const [tableSheets, setTableSheets] = useState([]);
      const [editingTable, setEditingTable] = useState(null);
      const [printMode, setPrintMode] = useState(null);
      const [printRound, setPrintRound] = useState(null);
      const [qrHandled, setQrHandled] = useState(false);
      const [showQuickScan, setShowQuickScan] = useState(false);
      const [showSpielerScan, setShowSpielerScan] = useState(false);
      const [showAnmeldeScan, setShowAnmeldeScan] = useState(false);
      const [showSignupManager, setShowSignupManager] = useState(false);
      const [showPrintAnmelde, setShowPrintAnmelde] = useState(false);
      const [showPrintRangliste, setShowPrintRangliste] = useState(false);

      useEffect(() => {
        (async () => {
          const [tRes, sRes] = await Promise.all([
            supabase.from('tournaments').select('*').order('date', { ascending: false }).limit(50),
            supabase.from('seasons').select('*').order('start_date', { ascending: false })
          ]);
          setTournaments(tRes.data || []);
          setSeasons(sRes.data || []);

          const activeSeason = (sRes.data || []).find(s => s.active);
          if (activeSeason) setSelectedSeasonId(activeSeason.id);

          if (qrParams && !qrHandled) {
            const qrTournament = (tRes.data || []).find(t => t.id === qrParams.tournamentId);
            if (qrTournament) {
              const { data: sheets } = await supabase.from('table_sheets').select('*').eq('tournament_id', qrTournament.id);
              const { data: tp } = await supabase.from('tournament_players').select('player_id').eq('tournament_id', qrTournament.id);
              await refreshPlayers();
              setActiveTournament(qrTournament);
              setTableSheets(sheets || []);
              if (tp) setSelectedPlayers(new Set(tp.map(x => x.player_id)));
              setActiveRound(qrParams.round);
              const existingSheet = (sheets || []).find(s => s.round_number === qrParams.round && s.table_number === qrParams.table);
              setEditingTable({ roundNumber: qrParams.round, tableNumber: qrParams.table, sheet: existingSheet || null });
              setQrHandled(true);
            } else {
              toast('Turnier nicht gefunden', 'error');
            }
          } else {
            const recent = (tRes.data || []).find(t => t.status === 'active');
            if (recent) loadTournament(recent);
          }
          setLoading(false);
        })();
      }, []);

      const loadTournament = async (tournament) => {
        setActiveTournament(tournament);
        const { data } = await supabase.from('table_sheets').select('*').eq('tournament_id', tournament.id);
        setTableSheets(data || []);
        const { data: tp } = await supabase.from('tournament_players').select('player_id').eq('tournament_id', tournament.id);
        if (tp) setSelectedPlayers(new Set(tp.map(x => x.player_id)));
        await refreshPlayers();
      };

      const createTournament = async () => {
        if (selectedPlayers.size === 0) { toast('Bitte Spieler auswählen', 'warning'); return; }
        if (selectedPlayers.size % 4 !== 0) { toast(`Spieleranzahl muss durch 4 teilbar sein (aktuell: ${selectedPlayers.size})`, 'error'); return; }
        const { data: existing } = await supabase.from('tournaments').select('id').eq('date', date);
        if (existing && existing.length > 0) { toast('Für dieses Datum existiert bereits ein Turnier', 'error'); return; }
        const tableCount = selectedPlayers.size / 4;
        const { data: t, error } = await supabase.from('tournaments').insert({
          date, player_count: selectedPlayers.size, table_count: tableCount, status: 'active',
          season_id: selectedSeasonId || null
        }).select().single();
        if (error) { toast('Fehler: ' + error.message, 'error'); return; }
        const tpRows = [...selectedPlayers].map(pid => ({ tournament_id: t.id, player_id: pid }));
        await supabase.from('tournament_players').insert(tpRows);
        toast(`Turnier erstellt: ${tableCount} Tische`);
        setActiveTournament(t);
        setTableSheets([]);
      };

      const togglePlayer = (id) => {
        setSelectedPlayers(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });
      };

      const selectAll = () => {
        const filteredActive = activePlayers.filter(p => p.name.toLowerCase().includes(playerSearch.toLowerCase()));
        if (filteredActive.every(p => selectedPlayers.has(p.id))) {
          setSelectedPlayers(prev => { const next = new Set(prev); filteredActive.forEach(p => next.delete(p.id)); return next; });
        } else {
          setSelectedPlayers(prev => { const next = new Set(prev); filteredActive.forEach(p => next.add(p.id)); return next; });
        }
      };

      const getRoundStatus = (roundNum) => {
        if (!activeTournament) return 'empty';
        const roundSheets = tableSheets.filter(s => s.round_number === roundNum);
        if (roundSheets.length === 0) return 'empty';
        const allVerified = roundSheets.length === activeTournament.table_count && roundSheets.every(s => s.verified);
        if (allVerified) return 'complete';
        return 'partial';
      };

      const roundStatusIcon = { empty: '⬜', partial: '🟡', complete: '✅', error: '🔴' };

      const getTablesForRound = (roundNum) => {
        if (!activeTournament) return [];
        const tables = [];
        for (let t = 1; t <= activeTournament.table_count; t++) {
          const sheet = tableSheets.find(s => s.round_number === roundNum && s.table_number === t);
          tables.push({ tableNumber: t, sheet });
        }
        return tables;
      };

      const getTableStatus = (sheet) => {
        if (!sheet || !sheet.games) return 'empty';
        const filledGames = sheet.games.filter(g => g.schwarz !== null && g.schwarz !== undefined);
        if (filledGames.length === 0) return 'empty';
        if (sheet.verified) return 'complete';
        if (filledGames.length < 8) return 'partial';
        const totalSchwarz = filledGames.reduce((s, g) => s + g.schwarz, 0);
        const totalRot = filledGames.reduce((s, g) => s + (157 - g.schwarz), 0);
        if (totalSchwarz + totalRot !== 1256) return 'error';
        return 'complete';
      };

      const tableStatusBorder = { empty: 'border-gray-300', partial: 'border-amber-400', complete: 'border-green-500', error: 'border-red-500' };
      const tableStatusBg = { empty: 'bg-gray-50', partial: 'bg-amber-50', complete: 'bg-green-50', error: 'bg-red-50' };

      // Realtime
      useEffect(() => {
        if (!activeTournament) return;
        const channel = supabase.channel('table_sheets_changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'table_sheets', filter: `tournament_id=eq.${activeTournament.id}` }, (payload) => {
            if (payload.eventType === 'INSERT') setTableSheets(prev => [...prev.filter(s => s.id !== payload.new.id), payload.new]);
            else if (payload.eventType === 'UPDATE') setTableSheets(prev => prev.map(s => s.id === payload.new.id ? payload.new : s));
            else if (payload.eventType === 'DELETE') setTableSheets(prev => prev.filter(s => s.id !== payload.old.id));
          }).subscribe();
        return () => supabase.removeChannel(channel);
      }, [activeTournament?.id]);

      // Auto-mark tournament as completed when all 5 rounds are fully verified
      useEffect(() => {
        if (!activeTournament || activeTournament.status === 'completed') return;
        if (tableSheets.length === 0) return;
        const totalNeeded = activeTournament.table_count * 5;
        const totalVerified = tableSheets.filter(s => s.verified).length;
        if (totalVerified === totalNeeded) {
          supabase.from('tournaments').update({ status: 'completed' }).eq('id', activeTournament.id).then(() => {
            setActiveTournament(prev => prev ? { ...prev, status: 'completed' } : prev);
          });
        }
      }, [tableSheets, activeTournament?.id, activeTournament?.status, activeTournament?.table_count]);

      const [showPrevious, setShowPrevious] = useState(false);
      const previousTournaments = tournaments.filter(t => !activeTournament || t.id !== activeTournament.id);

      // Rankings for print
      const rankings = useMemo(() => {
        if (!activeTournament || tableSheets.length === 0) return [];
        const playerMap = {};
        players.forEach(p => { playerMap[p.id] = p.name; });
        const scores = {};
        [...selectedPlayers].forEach(pid => { scores[pid] = { name: playerMap[pid] || 'Unbekannt', rounds: {}, total: 0 }; });
        tableSheets.forEach(sheet => {
          if (!sheet.games) return;
          const totalS = sheet.games.reduce((s, g) => s + (g.schwarz ?? 0), 0);
          const totalR = sheet.games.reduce((s, g) => s + (g.schwarz !== null && g.schwarz !== undefined ? 157 - g.schwarz : 0), 0);
          const round = sheet.round_number;
          [sheet.schwarz_player1_id, sheet.schwarz_player2_id].forEach(pid => { if (pid && scores[pid]) { scores[pid].rounds[round] = (scores[pid].rounds[round] || 0) + totalS; scores[pid].total += totalS; } });
          [sheet.rot_player1_id, sheet.rot_player2_id].forEach(pid => { if (pid && scores[pid]) { scores[pid].rounds[round] = (scores[pid].rounds[round] || 0) + totalR; scores[pid].total += totalR; } });
        });
        return Object.entries(scores).map(([id, data]) => ({ id, ...data })).sort((a, b) => b.total - a.total);
      }, [activeTournament, tableSheets, players, selectedPlayers]);

      if (loading) return <Spinner text="Daten werden geladen..." />;

      // ─── ACTIVE TOURNAMENT VIEW ───
      if (activeTournament) {
        return (
          <div className="space-y-5">
            <div className="bg-white rounded-xl shadow p-5">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <div>
                  <h2 className="text-xl font-bold text-gray-800">Turnier {formatDateLong(activeTournament.date)}</h2>
                  <p className="text-lg text-gray-500">{activeTournament.player_count} Spieler · {activeTournament.table_count} Tische</p>
                </div>
                <button onClick={() => { setActiveTournament(null); setActiveRound(null); setTableSheets([]); }}
                  className="px-5 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold text-lg min-h-[48px] hover:bg-gray-300">← Zurück</button>
              </div>
            </div>

            {/* Phase 6b: Flow Wizard */}
            <TurnierFlowWizard
              tournament={activeTournament}
              tableSheets={tableSheets}
              activeRound={activeRound}
              onSetRound={setActiveRound}
              onStartScan={() => setShowQuickScan(true)}
              onShowRangliste={() => onSwitchTab('rangliste')}
              onPrintRangliste={() => setShowPrintRangliste(true)}
            />

            {/* Fallback: Classic round selector (collapsible) */}
            <details className="bg-white rounded-xl shadow">
              <summary className="px-5 py-3 text-base font-semibold text-gray-500 cursor-pointer hover:text-gray-700 select-none">
                ▸ Runden manuell wählen
              </summary>
              <div className="px-5 pb-4 pt-1">
                <div className="grid grid-cols-5 gap-3">
                  {[1,2,3,4,5].map(r => {
                    const status = getRoundStatus(r);
                    const isActive = activeRound === r;
                    return (
                      <button key={r} onClick={() => setActiveRound(r)}
                        className={`flex flex-col items-center py-4 px-2 rounded-xl border-2 font-bold text-lg min-h-[80px] transition-all ${isActive ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-300' : 'border-gray-200 bg-white hover:border-gray-400'}`}>
                        <span className="text-2xl mb-1">{roundStatusIcon[status]}</span>
                        <span>Runde {r}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </details>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <button onClick={() => setShowQuickScan(true)}
                className="py-5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl font-bold text-xl min-h-[64px] hover:from-amber-600 hover:to-orange-600 shadow-lg transition-all flex items-center justify-center gap-2">
                📸 Tischzettel scannen
              </button>
              <button onClick={() => setShowSpielerScan(true)}
                className="py-5 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-xl font-bold text-xl min-h-[64px] hover:from-blue-600 hover:to-indigo-600 shadow-lg transition-all flex items-center justify-center gap-2">
                📋 Spielerzettel prüfen
              </button>
            </div>

            {activeRound && (
              <div className="bg-white rounded-xl shadow p-5 fade-in">
                <h3 className="text-lg font-bold text-gray-700 mb-3">Runde {activeRound} – Tische</h3>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                  {getTablesForRound(activeRound).map(({ tableNumber, sheet }) => {
                    const status = getTableStatus(sheet);
                    return (
                      <button key={tableNumber} onClick={() => setEditingTable({ roundNumber: activeRound, tableNumber, sheet })}
                        className={`flex flex-col items-center py-5 px-3 rounded-xl border-2 ${tableStatusBorder[status]} ${tableStatusBg[status]} font-bold text-lg min-h-[90px] hover:shadow-md transition-all`}>
                        <span className="text-2xl mb-1">{roundStatusIcon[status]}</span>
                        <span>Tisch {tableNumber}</span>
                        {sheet?.total_schwarz != null && <span className="text-sm text-gray-500 mt-1">S:{sheet.total_schwarz} R:{sheet.total_rot}</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            <div className="bg-white rounded-xl shadow p-5">
              <h3 className="text-lg font-bold text-gray-700 mb-3">🖨️ Drucken</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {activeRound ? (
                  <button onClick={() => { setPrintMode('tischzettel'); setPrintRound(activeRound); }}
                    className="flex items-center justify-center gap-2 py-4 px-5 bg-gray-800 text-white rounded-xl font-bold text-lg min-h-[56px] hover:bg-gray-900 transition-all">
                    📋 Tischzettel Runde {activeRound}
                  </button>
                ) : (
                  <div className="flex items-center justify-center py-4 px-5 bg-gray-100 text-gray-400 rounded-xl font-semibold text-lg min-h-[56px]">Runde wählen für Tischzettel</div>
                )}
                <button onClick={() => setPrintMode('spielerzettel')}
                  className="flex items-center justify-center gap-2 py-4 px-5 bg-blue-600 text-white rounded-xl font-bold text-lg min-h-[56px] hover:bg-blue-700 transition-all">
                  🎴 Spielerzettel
                </button>
              </div>
            </div>

            {editingTable && (
              <TableSheetEditor tournament={activeTournament} roundNumber={editingTable.roundNumber} tableNumber={editingTable.tableNumber}
                existingSheet={editingTable.sheet} allPlayers={players} tournamentPlayerIds={[...selectedPlayers]} allTableSheets={tableSheets}
                onClose={() => setEditingTable(null)}
                onSaved={(sheet) => { setTableSheets(prev => { const without = prev.filter(s => !(s.round_number === sheet.round_number && s.table_number === sheet.table_number)); return [...without, sheet]; }); setEditingTable(null); }} />
            )}
            {printMode === 'tischzettel' && printRound && <PrintTischzettel tournament={activeTournament} roundNumber={printRound} tableSheets={tableSheets} allPlayers={players} onClose={() => setPrintMode(null)} />}
            {printMode === 'spielerzettel' && <PrintSpielerzettel tournament={activeTournament} tableSheets={tableSheets} allPlayers={players} tournamentPlayerIds={[...selectedPlayers]} onClose={() => setPrintMode(null)} />}
            {showQuickScan && <QuickScanDialog tournament={activeTournament} allPlayers={players} tournamentPlayerIds={[...selectedPlayers]} allTableSheets={tableSheets} onClose={() => setShowQuickScan(false)} onSaved={(sheet) => { setTableSheets(prev => [...prev.filter(s => !(s.round_number === sheet.round_number && s.table_number === sheet.table_number)), sheet]); setShowQuickScan(false); }} />}
            {showSpielerScan && <SpielerzettelScanDialog tournament={activeTournament} allPlayers={players} tournamentPlayerIds={[...selectedPlayers]} allTableSheets={tableSheets} onClose={() => setShowSpielerScan(false)} />}
            {showPrintRangliste && <PrintRangliste tournament={activeTournament} rankings={rankings} onClose={() => setShowPrintRangliste(false)} />}
          </div>
        );
      }

      // ─── TOURNAMENT CREATION VIEW ───
      const filteredPlayers = activePlayers.filter(p => p.name.toLowerCase().includes(playerSearch.toLowerCase()));
      const isValid = selectedPlayers.size > 0 && selectedPlayers.size % 4 === 0;
      const tableCount = isValid ? selectedPlayers.size / 4 : 0;

      return (
        <div className="space-y-5">
          {previousTournaments.length > 0 && (
            <div className="bg-white rounded-xl shadow p-5">
              <button onClick={() => setShowPrevious(!showPrevious)} className="flex items-center gap-2 text-lg font-bold text-gray-800 w-full">
                <span>{showPrevious ? '▾' : '▸'}</span> Bisherige Turniere ({previousTournaments.length})
              </button>
              {showPrevious && (
                <div className="mt-3 space-y-2">
                  {previousTournaments.map(t => (
                    <button key={t.id} onClick={() => loadTournament(t)}
                      className="w-full text-left px-4 py-3 rounded-lg border border-gray-200 hover:bg-blue-50 flex justify-between items-center min-h-[48px]">
                      <span className="text-lg font-semibold">{formatDateCH(t.date)}</span>
                      <span className="text-gray-500">{t.player_count} Spieler · {t.table_count} Tische</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          <div className="bg-white rounded-xl shadow p-5">
            <h2 className="text-xl font-bold text-gray-800 mb-4">Neues Turnier erstellen</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
              <div>
                <label className="block text-lg font-semibold text-gray-700 mb-2">Datum</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)}
                  className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none" />
              </div>
              <div>
                <label className="block text-lg font-semibold text-gray-700 mb-2">Saison (optional)</label>
                <select value={selectedSeasonId || ''} onChange={e => setSelectedSeasonId(e.target.value || null)}
                  className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none bg-white">
                  <option value="">— Keine Saison —</option>
                  {seasons.map(s => (
                    <option key={s.id} value={s.id}>{s.name} {s.active ? '(aktiv)' : ''}</option>
                  ))}
                </select>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow p-5">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
              <h2 className="text-xl font-bold text-gray-800">Spieler auswählen</h2>
              <div className="flex items-center gap-4">
                <span className={`text-lg font-bold ${isValid ? 'text-green-600' : selectedPlayers.size > 0 ? 'text-red-600' : 'text-gray-400'}`}>
                  {selectedPlayers.size} gewählt
                  {selectedPlayers.size > 0 && selectedPlayers.size % 4 !== 0 && ` (brauche ${4 - (selectedPlayers.size % 4)} mehr)`}
                  {isValid && ` → ${tableCount} Tische`}
                </span>
              </div>
            </div>

            <div className="flex gap-3 mb-4 flex-wrap">
              <input type="text" placeholder="🔍 Spieler suchen..." value={playerSearch} onChange={e => setPlayerSearch(e.target.value)}
                className="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none" style={{minWidth:'140px'}} />
              <button onClick={() => setShowSignupManager(true)}
                className="px-5 py-3 bg-green-600 text-white rounded-lg font-semibold text-lg min-h-[48px] hover:bg-green-700 whitespace-nowrap">
                📋 Anmeldungen
              </button>
              <button onClick={() => setShowAnmeldeScan(true)}
                className="px-5 py-3 bg-amber-500 text-white rounded-lg font-semibold text-lg min-h-[48px] hover:bg-amber-600 whitespace-nowrap">📸 Scan</button>
              <button onClick={() => setShowPrintAnmelde(true)}
                className="px-5 py-3 bg-gray-800 text-white rounded-lg font-semibold text-lg min-h-[48px] hover:bg-gray-900 whitespace-nowrap">🖨️ Liste</button>
              <button onClick={selectAll}
                className="px-5 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold text-lg min-h-[48px] hover:bg-gray-300 whitespace-nowrap">Alle</button>
            </div>

            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 max-h-[50vh] overflow-y-auto">
              {filteredPlayers.map(p => (
                <button key={p.id} onClick={() => togglePlayer(p.id)}
                  className={`text-left px-4 py-3 rounded-lg border-2 font-semibold text-lg min-h-[48px] transition-all ${selectedPlayers.has(p.id) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-700 border-gray-300 hover:border-blue-400'}`}>
                  {selectedPlayers.has(p.id) ? '✓ ' : ''}{p.name}
                </button>
              ))}
            </div>

            {selectedPlayers.size > 0 && (
              <div className="mt-5 pt-4 border-t">
                <button onClick={createTournament} disabled={!isValid}
                  className={`w-full py-4 rounded-xl font-bold text-xl min-h-[56px] text-white transition-all ${isValid ? 'bg-blue-600 hover:bg-blue-700 shadow-lg' : 'bg-gray-300 cursor-not-allowed'}`}>
                  {isValid ? `🎯 Turnier starten (${tableCount} Tische)` : 'Spieleranzahl muss durch 4 teilbar sein'}
                </button>
              </div>
            )}
          </div>

          {showAnmeldeScan && <AnmeldeblattScanDialog allPlayers={activePlayers} onClose={() => setShowAnmeldeScan(false)}
            onApply={(ids) => { setSelectedPlayers(prev => { const next = new Set(prev); ids.forEach(id => next.add(id)); return next; }); setShowAnmeldeScan(false); }}
            onPlayersChanged={refreshPlayers} />}

          {showSignupManager && <SignupManagerDialog date={date} allPlayers={activePlayers} selectedPlayers={selectedPlayers}
            onClose={() => setShowSignupManager(false)}
            onApply={(ids) => { setSelectedPlayers(new Set(ids)); setShowSignupManager(false); }} />}

          {showPrintAnmelde && <PrintAnmeldeliste date={date} allPlayers={activePlayers} onClose={() => setShowPrintAnmelde(false)} />}
        </div>
      );
    }

    // ════════════════════════════════════════════
    //  SIGNUP MANAGER DIALOG
    // ════════════════════════════════════════════
    function SignupManagerDialog({ date, allPlayers, selectedPlayers, onClose, onApply }) {
      const toast = useToast();
      const [signups, setSignups] = useState({});
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [saving, setSaving] = useState(false);
      const [tournamentId, setTournamentId] = useState(null);

      useEffect(() => {
        (async () => {
          const { data: t } = await supabase.from('tournaments').select('id').eq('date', date).single();
          if (t) {
            setTournamentId(t.id);
            const { data: sData } = await supabase.from('tournament_signups').select('*').eq('tournament_id', t.id);
            if (sData) {
              const map = {};
              sData.forEach(s => { map[s.player_id] = s.status; });
              setSignups(map);
            }
          } else {
            const map = {};
            allPlayers.forEach(p => {
              map[p.id] = selectedPlayers.has(p.id) ? 'zugesagt' : 'offen';
            });
            setSignups(map);
          }
          setLoading(false);
        })();
      }, [date]);

      const setStatus = (playerId, status) => {
        setSignups(prev => ({ ...prev, [playerId]: status }));
      };

      const saveSignups = async () => {
        setSaving(true);
        if (tournamentId) {
          const rows = Object.entries(signups).map(([player_id, status]) => ({
            tournament_id: tournamentId, player_id, status
          }));
          const { error } = await supabase.from('tournament_signups').upsert(rows, { onConflict: 'tournament_id,player_id' });
          if (error) { toast('Fehler beim Speichern: ' + error.message, 'error'); setSaving(false); return; }
          toast('Anmeldungen gespeichert');
        } else {
          toast('Anmeldungen werden beim Turnier-Start gespeichert', 'warning');
        }
        setSaving(false);
      };

      const handleApply = () => {
        const zugesagt = Object.entries(signups).filter(([_, s]) => s === 'zugesagt').map(([id]) => id);
        onApply(zugesagt);
        toast(`${zugesagt.length} zugesagte Spieler übernommen`);
      };

      const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
      const counts = { zugesagt: 0, abgesagt: 0, offen: 0 };
      Object.values(signups).forEach(s => { if (counts[s] !== undefined) counts[s]++; });

      const statusColors = {
        zugesagt: 'bg-green-100 text-green-800 border-green-300',
        abgesagt: 'bg-red-100 text-red-600 border-red-300',
        offen: 'bg-gray-100 text-gray-500 border-gray-300'
      };

      if (loading) return (
        <div className="fixed inset-0 z-[9000] flex items-center justify-center modal-backdrop"><Spinner text="Anmeldungen laden..." /></div>
      );

      return (
        <div className="fixed inset-0 z-[9000] flex items-start justify-center modal-backdrop overflow-y-auto py-4" onClick={onClose}>
          <div className="bg-white rounded-xl shadow-2xl m-4 max-w-lg w-full fade-in" onClick={e => e.stopPropagation()}>
            <div className="px-5 py-4 border-b bg-gradient-to-r from-green-500 to-emerald-600 rounded-t-xl flex items-center justify-between">
              <h3 className="text-xl font-bold text-white">📋 Anmeldungen — {formatDateCH(date)}</h3>
              <button onClick={onClose} className="text-3xl text-white opacity-70 hover:opacity-100 leading-none px-2">×</button>
            </div>
            <div className="p-5 space-y-4">
              <div className="grid grid-cols-3 gap-2 text-center">
                <div className="bg-green-50 rounded-lg p-3 border border-green-200">
                  <div className="text-2xl font-bold text-green-700">{counts.zugesagt}</div>
                  <div className="text-sm text-green-600">Zugesagt</div>
                </div>
                <div className="bg-red-50 rounded-lg p-3 border border-red-200">
                  <div className="text-2xl font-bold text-red-600">{counts.abgesagt}</div>
                  <div className="text-sm text-red-500">Abgesagt</div>
                </div>
                <div className="bg-gray-50 rounded-lg p-3 border border-gray-200">
                  <div className="text-2xl font-bold text-gray-500">{counts.offen}</div>
                  <div className="text-sm text-gray-400">Offen</div>
                </div>
              </div>
              {counts.zugesagt > 0 && counts.zugesagt % 4 !== 0 && (
                <div className="bg-amber-50 border border-amber-300 rounded-lg p-3 text-amber-800 text-base font-semibold">
                  ⚠️ {counts.zugesagt} Zusagen — brauche {4 - (counts.zugesagt % 4)} mehr für teilbar durch 4
                </div>
              )}
              <input type="text" placeholder="🔍 Spieler suchen..." value={search} onChange={e => setSearch(e.target.value)}
                className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg min-h-[48px] focus:border-blue-500 focus:outline-none" />
              <div className="space-y-1 max-h-[50vh] overflow-y-auto">
                {filtered.map(p => {
                  const status = signups[p.id] || 'offen';
                  return (
                    <div key={p.id} className={`flex items-center gap-2 px-3 py-2 rounded-lg border ${statusColors[status]}`}>
                      <span className="flex-1 font-semibold text-lg truncate">{p.name}</span>
                      <div className="flex gap-1 flex-shrink-0">
                        <button onClick={() => setStatus(p.id, 'zugesagt')}
                          className={`px-3 py-2 rounded-lg text-sm font-bold min-h-[40px] ${status === 'zugesagt' ? 'bg-green-600 text-white' : 'bg-white text-green-700 border border-green-300 hover:bg-green-50'}`}>✅</button>
                        <button onClick={() => setStatus(p.id, 'abgesagt')}
                          className={`px-3 py-2 rounded-lg text-sm font-bold min-h-[40px] ${status === 'abgesagt' ? 'bg-red-600 text-white' : 'bg-white text-red-600 border border-red-300 hover:bg-red-50'}`}>❌</button>
                        <button onClick={() => setStatus(p.id, 'offen')}
                          className={`px-3 py-2 rounded-lg text-sm font-bold min-h-[40px] ${status === 'offen' ? 'bg-gray-500 text-white' : 'bg-white text-gray-500 border border-gray-300 hover:bg-gray-50'}`}>⏳</button>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="flex gap-3 pt-2">
                {tournamentId && (
                  <button onClick={saveSignups} disabled={saving}
                    className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold text-lg min-h-[48px] hover:bg-gray-300">
                    {saving ? '...' : '💾 Speichern'}
                  </button>
                )}
                <button onClick={handleApply}
                  className="flex-1 py-3 bg-green-600 text-white rounded-lg font-bold text-lg min-h-[48px] hover:bg-green-700">
                  ✅ {counts.zugesagt} Zusagen übernehmen
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════
    //  TABLE SHEET EDITOR
    // ════════════════════════════════════════════
    function TableSheetEditor({ tournament, roundNumber, tableNumber, existingSheet, allPlayers, tournamentPlayerIds, allTableSheets, onClose, onSaved }) {
      const toast = useToast();
      const [saving, setSaving] = useState(false);
      const [ocrLoading, setOcrLoading] = useState(false);
      const [ocrPreview, setOcrPreview] = useState(null);
      const [ocrError, setOcrError] = useState(null);
      const fileInputRef = useRef(null);
      const tournamentPlayers = allPlayers.filter(p => tournamentPlayerIds.includes(p.id)).sort((a,b) => a.name.localeCompare(b.name));

      const [schwarz1, setSchwarz1] = useState(existingSheet?.schwarz_player1_id || null);
      const [schwarz2, setSchwarz2] = useState(existingSheet?.schwarz_player2_id || null);
      const [rot1, setRot1] = useState(existingSheet?.rot_player1_id || null);
      const [rot2, setRot2] = useState(existingSheet?.rot_player2_id || null);

      const emptyGames = () => Array.from({ length: 8 }, () => ({ schwarz: '' }));
      const [games, setGames] = useState(() => {
        if (existingSheet?.games) return existingSheet.games.map(g => ({ schwarz: g.schwarz !== null && g.schwarz !== undefined ? String(g.schwarz) : '' }));
        return emptyGames();
      });
      const inputRefs = useRef([]);

      const setGameScore = (idx, val) => {
        const cleaned = val.replace(/[^0-9]/g, '');
        const num = cleaned === '' ? '' : Math.min(157, parseInt(cleaned));
        setGames(prev => prev.map((g, i) => i === idx ? { schwarz: String(num) } : g));
      };
      const handleKeyDown = (e, idx) => {
        if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); if (idx + 1 < 8 && inputRefs.current[idx + 1]) inputRefs.current[idx + 1].focus(); }
      };

      const parsedGames = games.map(g => { const s = g.schwarz === '' ? null : parseInt(g.schwarz); return { schwarz: s, rot: s !== null ? 157 - s : null }; });
      const totalSchwarz = parsedGames.reduce((sum, g) => sum + (g.schwarz ?? 0), 0);
      const totalRot = parsedGames.reduce((sum, g) => sum + (g.rot ?? 0), 0);
      const filledCount = parsedGames.filter(g => g.schwarz !== null).length;
      const grandTotal = totalSchwarz + totalRot;
      const isComplete = filledCount === 8 && grandTotal === 1256;
      const selectedIds = [schwarz1, schwarz2, rot1, rot2].filter(Boolean);

      const saveSheet = async () => {
        if (!schwarz1 || !schwarz2 || !rot1 || !rot2) { toast('Bitte alle 4 Spieler zuweisen', 'warning'); return; }
        if (new Set([schwarz1, schwarz2, rot1, rot2]).size !== 4) { toast('Jeder Spieler darf nur einmal vorkommen', 'error'); return; }
        setSaving(true);
        const gamesData = parsedGames.map(g => ({ schwarz: g.schwarz }));
        const row = { tournament_id: tournament.id, round_number: roundNumber, table_number: tableNumber, schwarz_player1_id: schwarz1, schwarz_player2_id: schwarz2, rot_player1_id: rot1, rot_player2_id: rot2, games: gamesData, total_schwarz: totalSchwarz, total_rot: totalRot, verified: isComplete, source: 'manual' };
        let result;
        if (existingSheet?.id) result = await supabase.from('table_sheets').update(row).eq('id', existingSheet.id).select().single();
        else result = await supabase.from('table_sheets').upsert(row, { onConflict: 'tournament_id,round_number,table_number' }).select().single();
        setSaving(false);
        if (result.error) { toast('Fehler beim Speichern: ' + result.error.message, 'error'); return; }
        toast(isComplete ? '✅ Tischblatt komplett gespeichert' : '💾 Zwischenstand gespeichert');
        onSaved(result.data);
      };

      const handleOCR = async (file) => {
        if (!file) return;
        setOcrError(null); setOcrLoading(true);
        try {
          const { data: keyData } = await supabase.from('settings').select('value').eq('key', 'claude_api_key').single();
          if (!keyData?.value) throw new Error('Kein API-Key hinterlegt. Bitte unter Verwaltung → Einstellungen speichern.');
          const { base64, mediaType } = await fileToBase64(file);
          const imageUrl = URL.createObjectURL(file);
          const ocrData = await performOCR(base64, mediaType, keyData.value);
          const matchResults = { schwarz: ocrData.schwarz.map(name => matchPlayerName(name, tournamentPlayers)), rot: ocrData.rot.map(name => matchPlayerName(name, tournamentPlayers)) };
          const otherSheets = (allTableSheets || []).filter(s => s.round_number === roundNumber && s.table_number !== tableNumber);
          const alreadyAssigned = new Set();
          otherSheets.forEach(s => { [s.schwarz_player1_id, s.schwarz_player2_id, s.rot_player1_id, s.rot_player2_id].filter(Boolean).forEach(id => alreadyAssigned.add(id)); });
          const allMatched = [...matchResults.schwarz, ...matchResults.rot];
          const duplicates = new Set();
          allMatched.forEach(m => { if (m.player && alreadyAssigned.has(m.player.id)) duplicates.add(m.player.id); });
          setOcrPreview({ imageUrl, ocrData, matchResults, duplicates, roundMismatch: ocrData.runde !== null && ocrData.runde !== roundNumber, tableMismatch: ocrData.tisch !== null && ocrData.tisch !== tableNumber, schwarz1Id: matchResults.schwarz[0]?.player?.id || null, schwarz2Id: matchResults.schwarz[1]?.player?.id || null, rot1Id: matchResults.rot[0]?.player?.id || null, rot2Id: matchResults.rot[1]?.player?.id || null });
        } catch (e) { setOcrError(e.message || 'OCR fehlgeschlagen'); }
        setOcrLoading(false);
      };

      const applyOCRData = () => {
        if (!ocrPreview) return;
        if (ocrPreview.schwarz1Id) setSchwarz1(ocrPreview.schwarz1Id);
        if (ocrPreview.schwarz2Id) setSchwarz2(ocrPreview.schwarz2Id);
        if (ocrPreview.rot1Id) setRot1(ocrPreview.rot1Id);
        if (ocrPreview.rot2Id) setRot2(ocrPreview.rot2Id);
        setGames(ocrPreview.ocrData.punkte.map(s => ({ schwarz: s !== null ? String(s) : '' })));
        setOcrPreview(null);
        toast('📸 Spieler + Punkte aus Foto übernommen — bitte kontrollieren!', 'success');
      };

      return (
        <div className="fixed inset-0 z-[9000] flex items-start justify-center modal-backdrop overflow-y-auto py-4" onClick={onClose}>
          <div className="bg-white rounded-xl shadow-2xl m-4 max-w-lg w-full fade-in" onClick={e => e.stopPropagation()}>
            <div className="px-5 py-4 border-b bg-gray-50 rounded-t-xl flex items-center justify-between">
              <h3 className="text-xl font-bold text-gray-800">Runde {roundNumber} · Tisch {tableNumber}</h3>
              <button onClick={onClose} className="text-3xl text-gray-400 hover:text-gray-600 leading-none px-2">×</button>
            </div>
            <div className="p-5 space-y-5">
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-gray-800 rounded-lg p-3">
                  <h4 className="text-white font-bold text-lg mb-2 text-center">Team Schwarz</h4>
                  <div className="space-y-2">
                    <PlayerDropdown players={tournamentPlayers} value={schwarz1} onChange={setSchwarz1} label="Spieler 1" bgClass="bg-gray-700" textClass="text-white" excludeIds={selectedIds.filter(id => id !== schwarz1)} />
                    <PlayerDropdown players={tournamentPlayers} value={schwarz2} onChange={setSchwarz2} label="Spieler 2" bgClass="bg-gray-700" textClass="text-white" excludeIds={selectedIds.filter(id => id !== schwarz2)} />
                  </div>
                </div>
                <div className="bg-red-600 rounded-lg p-3">
                  <h4 className="text-white font-bold text-lg mb-2 text-center">Team Rot</h4>
                  <div className="space-y-2">
                    <PlayerDropdown players={tournamentPlayers} value={rot1} onChange={setRot1} label="Spieler 1" bgClass="bg-red-500" textClass="text-white" excludeIds={selectedIds.filter(id => id !== rot1)} />
                    <PlayerDropdown players={tournamentPlayers} value={rot2} onChange={setRot2} label="Spieler 2" bgClass="bg-red-500" textClass="text-white" excludeIds={selectedIds.filter(id => id !== rot2)} />
                  </div>
                </div>
              </div>
              <div>
                <div className="grid grid-cols-[40px_1fr_1fr] gap-2 mb-2">
                  <div></div>
                  <div className="text-center font-bold text-gray-800 bg-gray-200 rounded py-1">Schwarz</div>
                  <div className="text-center font-bold text-red-700 bg-red-100 rounded py-1">Rot</div>
                </div>
                {parsedGames.map((g, idx) => {
                  const isValid = g.schwarz !== null ? (g.schwarz + g.rot === 157) : true;
                  const hasValue = g.schwarz !== null;
                  return (
                    <div key={idx} className="grid grid-cols-[40px_1fr_1fr] gap-2 mb-1 items-center">
                      <span className="text-sm font-bold text-gray-400 text-right">{idx + 1}.</span>
                      <input ref={el => inputRefs.current[idx] = el} type="number" min="0" max="157" value={games[idx].schwarz} onChange={e => setGameScore(idx, e.target.value)} onKeyDown={e => handleKeyDown(e, idx)} placeholder="0-157"
                        className={`w-full px-3 py-2 border-2 rounded-lg text-center text-lg font-semibold min-h-[44px] focus:outline-none ${hasValue ? (isValid ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50') : 'border-gray-300'}`} />
                      <div className={`px-3 py-2 border-2 rounded-lg text-center text-lg font-semibold min-h-[44px] ${hasValue ? (isValid ? 'border-green-400 bg-green-50 text-green-800' : 'border-red-400 bg-red-50 text-red-800') : 'border-gray-200 bg-gray-50 text-gray-400'}`}>
                        {g.rot !== null ? g.rot : '—'}
                      </div>
                    </div>
                  );
                })}
                <div className="grid grid-cols-[40px_1fr_1fr] gap-2 mt-3 pt-3 border-t-2 border-gray-300">
                  <span className="text-sm font-bold text-gray-400 text-right">Σ</span>
                  <div className={`px-3 py-2 rounded-lg text-center text-xl font-bold min-h-[48px] flex items-center justify-center ${isComplete ? 'bg-green-100 text-green-800' : filledCount === 8 ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-600'}`}>{totalSchwarz}</div>
                  <div className={`px-3 py-2 rounded-lg text-center text-xl font-bold min-h-[48px] flex items-center justify-center ${isComplete ? 'bg-green-100 text-green-800' : filledCount === 8 ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-600'}`}>{totalRot}</div>
                </div>
                <div className="text-center mt-2">
                  {filledCount === 8 && isComplete && <span className="text-green-600 font-bold text-lg">✅ Total = 1'256 — Korrekt!</span>}
                  {filledCount === 8 && !isComplete && <span className="text-red-600 font-bold text-lg">❌ Total = {grandTotal} — Muss 1'256 sein!</span>}
                  {filledCount > 0 && filledCount < 8 && <span className="text-gray-400 text-lg">{filledCount}/8 Spiele eingegeben</span>}
                </div>
              </div>
              {/* OCR */}
              <div className="border-2 border-dashed border-gray-300 rounded-xl p-4">
                <input ref={fileInputRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={e => { if (e.target.files[0]) handleOCR(e.target.files[0]); e.target.value = ''; }} />
                {!ocrLoading && !ocrPreview && !ocrError && (
                  <button onClick={() => fileInputRef.current?.click()} className="w-full py-4 rounded-xl bg-amber-50 border-2 border-amber-300 text-amber-800 font-bold text-lg min-h-[56px] hover:bg-amber-100 transition-all flex items-center justify-center gap-2">📸 Tischzettel fotografieren (OCR)</button>
                )}
                {ocrLoading && <div className="text-center py-6"><svg className="animate-spin h-8 w-8 text-amber-600 mx-auto mb-3" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg><p className="text-lg text-amber-700 font-semibold">Tischzettel wird analysiert...</p></div>}
                {ocrError && <div className="bg-red-50 border border-red-300 rounded-lg p-4"><p className="text-red-700 font-semibold">❌ {ocrError}</p><button onClick={() => { setOcrError(null); fileInputRef.current?.click(); }} className="mt-2 px-4 py-2 bg-red-100 text-red-700 rounded-lg font-semibold text-base min-h-[44px]">Nochmal versuchen</button></div>}
                {ocrPreview && (() => {
                  const { ocrData, matchResults, duplicates, roundMismatch, tableMismatch } = ocrPreview;
                  const confIcon = (c) => c === 'exact' ? '✅' : c === 'reversed' ? '🔄' : c === 'partial' ? '⚠️' : '❓';
                  const confLabel = (c) => c === 'exact' ? 'Erkannt' : c === 'reversed' ? 'Gedreht' : c === 'partial' ? 'Teilmatch' : 'Nicht erkannt';
                  const renderPM = (key, ocrName, match, currentId, bgCls) => (
                    <div className={`${bgCls} rounded-lg p-2 mb-1`}>
                      <div className="flex items-center justify-between mb-1"><span className="text-xs text-white opacity-70">{key}</span><span className="text-xs text-white">{confIcon(match.confidence)} {confLabel(match.confidence)}</span></div>
                      {ocrName && <div className="text-sm text-white opacity-60 mb-1">OCR: «{ocrName}»</div>}
                      {match.confidence !== 'none' && match.player ? (
                        <div className="flex items-center gap-2"><span className="text-white font-bold flex-1">{match.player.name}</span>{duplicates.has(match.player.id) && <span className="bg-red-800 text-white text-xs px-2 py-0.5 rounded font-bold">⚠ DOPPELT</span>}</div>
                      ) : (
                        <select value={currentId || ''} onChange={e => setOcrPreview(prev => ({ ...prev, [key + 'Id']: e.target.value || null }))} className="w-full px-2 py-1.5 rounded text-base font-semibold bg-white text-gray-800"><option value="">— Manuell wählen —</option>{tournamentPlayers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                      )}
                    </div>
                  );
                  return (
                    <div className="space-y-3">
                      {(roundMismatch || tableMismatch) && <div className="bg-amber-50 border border-amber-300 rounded-lg p-3 text-amber-800 font-semibold text-base">⚠️ {roundMismatch && `Zettel: Runde ${ocrData.runde}, hier: ${roundNumber}. `}{tableMismatch && `Zettel: Tisch ${ocrData.tisch}, hier: ${tableNumber}.`}</div>}
                      {ocrPreview.imageUrl && <img src={ocrPreview.imageUrl} alt="Foto" className="w-full max-h-36 object-contain rounded-lg border" />}
                      <div className="grid grid-cols-2 gap-2">
                        <div><div className="text-center font-bold text-sm text-gray-700 mb-1">Schwarz</div>{renderPM('schwarz1', ocrData.schwarz[0], matchResults.schwarz[0], ocrPreview.schwarz1Id, 'bg-gray-700')}{renderPM('schwarz2', ocrData.schwarz[1], matchResults.schwarz[1], ocrPreview.schwarz2Id, 'bg-gray-700')}</div>
